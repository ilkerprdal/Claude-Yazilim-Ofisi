name: Bug report
description: Something doesn't work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in what you can — partial reports are
        better than none.

  - type: input
    id: version
    attributes:
      label: Software Office version
      description: Output of `cat CLAUDE.md | head -3` or your install date.
      placeholder: v0.1.0 (or commit SHA)
    validations:
      required: false

  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      description: Run `claude --version`.
      placeholder: e.g. 2.1.32
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (PowerShell)
        - Windows (Git Bash)
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: One-paragraph summary of the problem.
      placeholder: I ran /start in an empty folder and...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. cd /some/empty/dir
        2. bash install.sh
        3. claude
        4. /start
        5. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste any relevant terminal output. Wrap in code fences.
      render: shell
    validations:
      required: false
